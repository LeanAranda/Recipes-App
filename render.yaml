services:
  - type: web
    name: recipes-app-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate && npm run build && npx prisma migrate deploy"
    startCommand: "npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recipes-db
          property: connectionString
      - key: JWT_SECRET
        value: "jwt_secret_key"

databases:
  - name: recipes-db
    plan: free
    databaseName: recipes
    user: recipes_user
